name: Feature request
description: Suggest an enhancement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please check existing issues first to avoid
        duplicates.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do, and where does the project fall short today?
      placeholder: As an agent author, I want ... so that ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the enhancement and how you imagine it working.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you have thought about.
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: Fit with project scope
      description: >-
        How does this fit the evidence-first author → run → observe → verify
        loop and the supported Godot 4.4–4.7 boundary?
    validations:
      required: false
