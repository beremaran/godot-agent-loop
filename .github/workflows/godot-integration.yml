name: Godot integration tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  godot:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 4.4-stable is the documented minimum supported release; 4.7-stable is
        # the current one. Both shipped scripts must parse and behave on each.
        godot-version: ["4.4-stable", "4.7-stable"]
    name: Godot ${{ matrix.godot-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot ${{ matrix.godot-version }}
        run: |
          curl -sSL -o godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${{ matrix.godot-version }}/Godot_v${{ matrix.godot-version }}_linux.x86_64.zip"
          unzip -q godot.zip
          mkdir -p "$HOME/.local/bin"
          mv "Godot_v${{ matrix.godot-version }}_linux.x86_64" "$HOME/.local/bin/godot"
          chmod +x "$HOME/.local/bin/godot"
          echo "GODOT_BIN=$HOME/.local/bin/godot" >> "$GITHUB_ENV"
          "$HOME/.local/bin/godot" --version

      - name: Type-check the shipped scripts with warnings promoted to errors
        run: tests/godot/run-typecheck.sh

      - name: Run every headless operation against a fixture project
        run: tests/godot/run-headless-operations.sh

      - name: Run the runtime server integration tests
        run: tests/godot/run-integration-tests.sh
