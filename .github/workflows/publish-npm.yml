name: Publish npm release

# Kept workflow_dispatch-only so publication always requires an explicit wave
# approval and exact confirmation string.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Signed, fully tested release tag
        required: true
        default: v1.0.0
      confirmation:
        description: Type publish-@beremaran/godot-agent-loop@1.0.0
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Require the exact publication confirmation
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: test "$CONFIRMATION" = "publish-@beremaran/godot-agent-loop@1.0.0"

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Verify the signed exact-version tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_SIGNING_KEY: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIsZdWjkdesADYJ5uI4zJwW1jtlGBXLc01aZoz3TTdvt
        run: |
          ALLOWED_SIGNERS="$RUNNER_TEMP/godot-agent-loop-allowed-signers"
          printf '%s %s\n' 'berke@beremaran.com' "$RELEASE_SIGNING_KEY" > "$ALLOWED_SIGNERS"
          git -c gpg.ssh.allowedSignersFile="$ALLOWED_SIGNERS" verify-tag "$RELEASE_TAG"
          test "$(git describe --tags --exact-match HEAD)" = "$RELEASE_TAG"
          test "$(git rev-parse "$RELEASE_TAG^{}")" = "$(git rev-parse HEAD)"
          test "$(node -p 'require("./package.json").version')" = "${RELEASE_TAG#v}"

      - name: Install the audited Godot 4.7 engine
        env:
          GODOT_ARCHIVE_SHA256: 0b1a6c54c2c619c12e169fe9241edda4b81080b519451cec2984bf0d2c6cb73c
        run: |
          GODOT_ARCHIVE="$RUNNER_TEMP/Godot_v4.7-stable_linux.x86_64.zip"
          GODOT_DIR="$RUNNER_TEMP/godot-4.7-stable"
          curl --fail --location --retry 3 --silent --show-error \
            --output "$GODOT_ARCHIVE" \
            https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          printf '%s  %s\n' "$GODOT_ARCHIVE_SHA256" "$GODOT_ARCHIVE" | sha256sum --check --strict
          mkdir -p "$GODOT_DIR"
          unzip -q "$GODOT_ARCHIVE" -d "$GODOT_DIR"
          GODOT_BIN="$GODOT_DIR/Godot_v4.7-stable_linux.x86_64"
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
          "$GODOT_BIN" --version

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install and rebuild the exact source
        run: npm ci --ignore-scripts

      - name: Recheck TypeScript, contracts, lint, and generated evidence
        run: npm run check

      - name: Build the exact npm tarball
        run: |
          mkdir -p dist
          npm pack --pack-destination dist

      - name: Publish the tested tarball with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ./dist/beremaran-godot-agent-loop-1.0.0.tgz --access public --provenance
